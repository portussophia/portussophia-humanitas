name: Verify Sealed Corpus

on:
  pull_request:
    paths:
      - 'corpus/sealed/**'
  push:
    branches: [ main ]
    paths:
      - 'corpus/sealed/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run verification
        run: python scripts/verify_sealed.py

title: "PortusHumanitas™"
description: >-
  Public orientation, phrase, lineage, and provenance surface for the PortusHumanitas humanistic record.
url: "https://humanitas.portussophia.com"
baseurl: ""
lang: en
author: "James Roy Dennis"

portussophia:
  template_version: "1.0.0"
  asset_origin: "https://assets.portussophia.com"
  asset_version: "20260719-2"

  header_label: "PortusHumanitas™"
  header_role: "A Harbor of Inquiry"

  identity_logo_url: "https://assets.portussophia.com/img/site/logo.png"
  identity_logo_alt: "PortusSophia programme mark"
  identity_title: "PortusHumanitas™"
  identity_declaration: "A public record of lived human experience becoming sustained inquiry within PortusSophia™."

  rights_url: "/RIGHTS.md"

markdown: kramdown
theme: null
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - _admin
  - .bundle
  - vendor
  - Gemfile
  - Gemfile.lock
  - scripts
  - README.md
  - RIGHTS.md
  - SCAFFOLD.md

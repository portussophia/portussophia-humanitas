<header class="site-header">
  <div class="shell header-inner">
    <a class="site-identity site-brand" href="{{ '/' | relative_url }}" aria-label="PortusHumanitas home">
      <span class="site-name site-brand__title">PortusHumanitas™</span>
      <span class="site-role site-brand__subtitle">A Harbor of Lived Inquiry</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <ul class="nav-list">
        {% for item in site.data.navigation %}
          <li>
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  {% feed_meta %}
  <link rel="stylesheet" href="{{ site.asset_host }}/styles/v1/site.css?v={{ site.asset_version }}">
  <link rel="stylesheet" href="{{ site.asset_host }}/styles/v1/background-sailcloth.css?v={{ site.asset_version }}">
  <link rel="stylesheet" href="{{ site.asset_host }}/styles/v1/navigation.css?v={{ site.asset_version }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.asset_version }}">
</head>
<body class="{% if page.layout %}layout-{{ page.layout }}{% endif %}">
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% include header.html %}
  <main id="main-content" class="site-main">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ site.asset_host }}/js/navigation.js?v={{ site.asset_version }}" defer></script>
</body>
</html>

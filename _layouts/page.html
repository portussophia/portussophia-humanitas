---
layout: default
---
<article class="page shell reading-shell">
  <header class="page-header">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.intro %}<p class="page-intro">{{ page.intro }}</p>{% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>

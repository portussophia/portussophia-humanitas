---
layout: default
---
<article class="page">
  <header class="page-header page-header--navy">
    <div class="shell reading-shell">
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.intro %}<p class="page-intro">{{ page.intro }}</p>{% endif %}
    </div>
  </header>
  <div class="page-content shell reading-shell">
    {{ content }}
  </div>
</article>
